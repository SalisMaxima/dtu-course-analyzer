<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>DTU Course Analyzer</title>

<style>
  body {
    font-family: Arial, Helvetica, sans-serif;
    margin: 20px;
    color: #333;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    margin: 10px 0;
  }

  .language-label {
    font-size: 14px;
    color: #666;
  }

  .language-toggle-btn {
    padding: 8px 16px;
    border: 1px solid #990000;
    background-color: #fff;
    color: #990000;
    cursor: pointer;
    border-radius: 4px;
    font-weight: bold;
    transition: all 0.2s ease;
  }

  .language-toggle-btn:hover,
  .language-toggle-btn.active {
    background-color: #990000;
    color: #fff;
  }

  #search-input {
    margin-left: auto;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    min-width: 220px;
  }

  table#course-table {
    border-collapse: collapse;
    width: 100%;
  }

  #course-table th,
  #course-table td {
    border-bottom: 1px solid #ddd;
    padding: 6px 10px;
    text-align: left;
    white-space: nowrap;
  }

  #course-table th {
    cursor: pointer;
    user-select: none;
    background-color: #f5f5f5;
    border-bottom: 2px solid #990000;
  }

  #course-table th .sort-indicator {
    display: inline-block;
    width: 1em;
    color: #990000;
  }

  #course-table tbody tr:hover {
    background-color: #f9f0f0;
  }

  #course-table a {
    color: #990000;
  }

  /* Language toggle: both name columns stay in the DOM, visibility is class-driven */
  #course-table.lang-en .col-name,
  #course-table.lang-da .col-name-en {
    display: none;
  }

  .pagination {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 12px 0;
  }

  .pagination button {
    padding: 6px 14px;
    border: 1px solid #990000;
    background-color: #fff;
    color: #990000;
    cursor: pointer;
    border-radius: 4px;
  }

  .pagination button:disabled {
    border-color: #ccc;
    color: #ccc;
    cursor: default;
  }

  #table-info {
    font-size: 14px;
    color: #666;
  }
</style>

</head>
<body>

<div class="controls">
  <span class="language-label">Display language:</span>
  <button id="lang-da" class="language-toggle-btn">Dansk</button>
  <button id="lang-en" class="language-toggle-btn active">English</button>
  <input id="search-input" type="search" placeholder="Search course number or name">
</div>

<table id="course-table" class="lang-en">
  <thead>
    <tr>
      <th data-key="course" data-type="text">Course<span class="sort-indicator"></span></th>
      <th data-key="name" data-type="text" class="col-name">Name<span class="sort-indicator"></span></th>
      <th data-key="name_en" data-type="text" class="col-name-en">Name (EN)<span class="sort-indicator"></span></th>
      <th data-key="avg" data-type="number">Average Grade<span class="sort-indicator"></span></th>
      <th data-key="avgp" data-type="number">Average Grade Percentile<span class="sort-indicator"></span></th>
      <th data-key="passpercent" data-type="number">Percent Passed<span class="sort-indicator"></span></th>
      <th data-key="grade_participants" data-type="number">Total Students<span class="sort-indicator"></span></th>
      <th data-key="review_participants" data-type="number">Feedback Count<span class="sort-indicator"></span></th>
      <th data-key="qualityscore" data-type="number">Course Rating<span class="sort-indicator"></span></th>
      <th data-key="workload" data-type="number">Workload<span class="sort-indicator"></span></th>
      <th data-key="lazyscore" data-type="number">Lazy Score Percentile<span class="sort-indicator"></span></th>
    </tr>
  </thead>
  <tbody id="course-tbody"></tbody>
</table>

<div class="pagination">
  <button id="prev-page">Previous</button>
  <span id="table-info"></span>
  <button id="next-page">Next</button>
</div>

<script src="js/table.js"></script>
<script src="js/language-toggle.js"></script>

</body>
</html>
